name: devcontainer

on:
  push:
    branches: [master]
    paths:
      - ".devcontainer/**"
      - ".dockerignore"
      - "vcpkg.json"
      - "*/*.csproj"
      - ".github/workflows/devcontainer.yml"
  pull_request:
    branches: [master]
    paths:
      - ".devcontainer/**"
      - ".dockerignore"
      - "vcpkg.json"
      - "*/*.csproj"
      - ".github/workflows/devcontainer.yml"
  # Run once a week
  schedule:
    - cron: "34 2 * * 2"

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build devcontainer
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ghcr.io/${{ github.repository }}/devcontainer
          tags: latest
          labels: |
            org.opencontainers.image.title=ParquetSharp devcontainer
            org.opencontainers.image.description=devcontainer for ParquetSharp
      - if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'schedule'
        name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          file: .devcontainer/Dockerfile
          push: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'schedule' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
